<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 MATS - Tactical Search & Reporting</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Arial Narrow', sans-serif; overflow: hidden; }
        #map { width: 100%; height: calc(100% - 140px); }
        
        .header { height: 50px; background: #0b2414; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #d4af37; }
        .nv-red { filter: sepia(100%) hue-rotate(-50deg) saturate(400%) brightness(0.6) !important; }

        /* Tactical Control Dock */
        .control-dock { height: 70px; background: #111; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid #d4af37; }
        .k9-dot { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #d4af37; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        
        .footer { height: 20px; background: #000; color: #d4af37; text-align: center; font-size: 10px; line-height: 20px; }
        
        /* Report Modal */
        #report-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .report-header { border-bottom: 2px solid #d4af37; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div style="color: #d4af37; font-weight: bold;">ACSO K9 TACTICAL SEARCH</div>
    <button onclick="toggleNV()" style="background:#900; color:#fff; border:1px solid #fff; padding:5px; font-weight:bold;">NV RED</button>
</div>

<div id="map"></div>

<div class="control-dock">
    <div class="k9-dot" style="background:#00f;" onclick="logK9('TRACK START')">🐾</div>
    <div class="k9-dot" style="background:#0f0;" onclick="logK9('K9 ALERT/FIND')">🐕</div>
    <div class="k9-dot" style="background:#f00;" onclick="logK9('EVIDENCE FOUND')">🚩</div>
    <div class="k9-dot" style="background:#800080;" onclick="logK9('SUSPECT SIGHTING')">👤</div>
    <button onclick="finalizeIncident()" style="background:#d4af37; color:#000; font-weight:bold; padding:10px; border-radius:5px;">FINALIZE REPORT</button>
</div>

<div class="footer">App Created by Retired Deputy Sheriff EARL A. WOOD</div>

<!-- K9 Incident Report Interface -->
<div id="report-modal">
    <div class="report-header">
        <h2 style="color:#d4af37; margin:0;">OFFICIAL K9 INCIDENT & TRAINING LOG</h2>
        <p style="font-size: 0.8em;">AUTO-GENERATED FOR COURT & RECORDS</p>
    </div>
    <div id="k9-log-body" style="background:#111; padding:15px; font-family:monospace; margin-bottom:20px; border-left: 3px solid #d4af37;"></div>
    <div style="display:flex; flex-direction:column; gap:15px;">
        <button onclick="savePDF()" style="background:#d4af37; padding:20px; font-weight:bold; font-size:1.1em;">PRINT TO PDF (FOR SHERIFF / RECORDS)</button>
        <button onclick="location.reload()" style="background:#444; color:#fff; padding:10px;">RESET FOR NEXT CALL</button>
    </div>
</div>

<script>
    var map = L.map('map', { zoomControl: false }).setView([37.58, -79.05], 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var k9ActivityLog = [];
    
    // Log K9 Action and Place GPS Marker
    function logK9(action) {
        var time = new Date().toLocaleTimeString();
        var coords = map.getCenter(); // Using center of crosshair for precision
        
        L.circleMarker(coords, { radius: 10, fillColor: '#d4af37', color: '#fff', fillOpacity: 0.8 }).addTo(map)
         .bindPopup(`<b>${action}</b><br>${time}`).openPopup();
        
        k9ActivityLog.push({ time: time, action: action, lat: coords.lat.toFixed(5), lng: coords.lng.toFixed(5) });
    }

    function toggleNV() { document.getElementById('map').classList.toggle('nv-red'); }

    function finalizeIncident() {
        document.getElementById('report-modal').style.display = 'block';
        var display = document.getElementById('k9-log-body');
        display.innerHTML = `AGENCY: AMHERST/LYNCHBURG<br>K9 HANDLER: DEPUTY ASSIGNED<br>DATE: ${new Date().toLocaleDateString()}<br>----------------------------<br>`;
        k9ActivityLog.forEach(item => {
            display.innerHTML += `[${item.time}] ${item.action} @ GPS: ${item.lat}, ${item.lng}<br>`;
        });
    }

    function savePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("courier", "bold");
        doc.text("K9 INCIDENT TRACKING REPORT", 10, 10);
        doc.setFontSize(10);
        doc.setFont("courier", "normal");
        let y = 25;
        k9ActivityLog.forEach(item => {
            doc.text(`[${item.time}] ${item.action} - GPS: ${item.lat}, ${item.lng}`, 10, y);
            y += 8;
        });
        doc.save(`K9_Report_${new Date().getTime()}.pdf`);
    }

    map.locate({setView: true, watch: true, enableHighAccuracy: true});
</script>

</body>
</html>
